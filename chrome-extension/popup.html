<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <style>
    body { width: 300px; margin: 0; background: #1c1c1e; color: #e8e8ea;
           font-family: "Segoe UI", system-ui, sans-serif; }
    .head { padding: 10px 12px 8px; border-bottom: 1px solid #333; }
    .mood { font-size: 13px; font-weight: 600; }
    .total { font-size: 11px; color: #9a9a9e; margin-top: 3px; }
    .legend { display: flex; gap: 8px; padding: 4px 12px; font-size: 10px;
              color: #6a6a6e; border-bottom: 1px solid #2a2a2c; }
    .legend .nm { flex: 1; }
    .legend .pct { min-width: 56px; text-align: right; }
    ul { list-style: none; margin: 0; padding: 2px 0; max-height: 340px; overflow-y: auto; }
    li { display: flex; align-items: baseline; gap: 8px; padding: 6px 12px; }
    li:hover { background: #2a2a2c; }
    .nm { flex: 1; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .qty { color: #7a7a7e; font-size: 11px; }
    .pct { font-variant-numeric: tabular-nums; font-size: 12px; min-width: 56px; text-align: right; }
    .up { color: #ff5a5a; } .down { color: #5a9bff; } .flat { color: #9a9a9e; }
    .empty { padding: 16px 12px; color: #8a8a8e; font-size: 12px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="head">
    <div class="mood" id="mood">불러오는 중…</div>
    <div class="total" id="total"></div>
  </div>
  <div class="legend"><span class="nm">종목</span><span class="pct">당일</span><span class="pct">누적</span></div>
  <ul id="list"></ul>
  <script src="popup.js"></script>
</body>
</html>
